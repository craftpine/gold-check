<div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
  <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
    <h3 class="font-semibold text-slate-800">Source Comparison</h3>
    <span
      class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded border border-amber-200 uppercase">Live
      Update</span>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-left text-sm">
      <thead>
        <tr class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
          <th class="px-6 py-3">Source</th>
          <th class="px-6 py-3">Buy</th>
          <th class="px-6 py-3">Sell</th>
          <th class="px-6 py-3 text-right">24h Change</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        @for (source of sources; track source.name) {
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 font-semibold text-slate-900">{{ source.name }}</td>
            <td class="px-6 py-4">{{ source.buy }}</td>
            <td class="px-6 py-4">{{ source.sell }}</td>
            <td class="px-6 py-4 text-right">
              @if (source.isPositive && source.change > 0.4) {
                <span class="text-emerald-600 font-medium inline-flex items-center gap-1 justify-end">
                  <span class="material-symbols-outlined text-xs">arrow_upward</span>
                  {{ source.changeLabel }}
                </span>
              } @else {
                <span
                  [class]="source.isPositive ? 'text-emerald-600 font-medium' : 'text-rose-600 font-medium'">
                  {{ source.changeLabel }}
                </span>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  <div class="px-6 py-3 bg-slate-50 border-t border-slate-200">
    <button
      class="text-xs font-bold text-amber-600 hover:text-amber-700 uppercase tracking-wider"
      (click)="onExportData()">
      Detailed Data Export
    </button>
  </div>
</div>
