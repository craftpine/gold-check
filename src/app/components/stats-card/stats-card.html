<div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
  <div class="flex items-center gap-2 mb-1">
    <span class="material-symbols-outlined text-sm text-slate-400">{{ icon }}</span>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">{{ label }}</p>
  </div>
  <p class="text-2xl font-bold text-slate-900">{{ value }}</p>
  <span
    [class]="badgeType === 'success'
      ? 'text-[10px] text-emerald-600 font-bold bg-emerald-50 px-1.5 py-0.5 rounded'
      : 'text-[10px] text-slate-400 font-bold bg-slate-100 px-1.5 py-0.5 rounded'">
    {{ badge }}
  </span>
</div>
