<header
  class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10 flex-shrink-0">
  <div>
    <h2 class="text-2xl font-bold text-slate-900">Real-time Dashboard</h2>
    <p class="text-sm text-slate-500">Live gold price performance across major sources</p>
  </div>
  <div class="flex items-center gap-4">
    <div class="relative">
      <span
        class="material-symbols-outlined absolute left-3 top-1.5 text-slate-400 text-base leading-none flex items-center">search</span>
      <input
        class="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-amber-500 w-64"
        placeholder="Search markets..."
        type="text"
        (input)="onSearch($event)" />
    </div>
    <button
      class="flex items-center justify-center p-2 text-slate-400 hover:text-slate-600"
      (click)="onNotificationClick()">
      <span class="material-symbols-outlined">notifications</span>
    </button>
  </div>
</header>
